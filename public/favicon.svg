<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="k-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <linearGradient id="c-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Modern dark rounded rectangle background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  
  <!-- Subtle decorative ring in the background -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="32" />

  <!-- KC Monogram with glow -->
  <g transform="translate(79, 120)" filter="url(#glow)">
    <!-- The K -->
    <path d="M 40 20 L 40 252" stroke="url(#k-grad)" stroke-width="48" stroke-linecap="round" />
    <path d="M 50 136 L 160 20" stroke="url(#k-grad)" stroke-width="48" stroke-linecap="round" />
    <path d="M 90 96 L 170 252" stroke="url(#k-grad)" stroke-width="48" stroke-linecap="round" />
    
    <!-- The C -->
    <path d="M 330 40 A 100 100 0 0 0 330 232" stroke="url(#c-grad)" stroke-width="48" stroke-linecap="round" fill="none" />
  </g>
</svg>
